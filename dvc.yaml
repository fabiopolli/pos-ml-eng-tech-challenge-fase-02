stages:
  prepare:
    desc: >
      Stage 1: Data Preparation.
      Merges raw Olist CSVs, filters delivered orders, 
      aggregates user-item interactions, and saves 
      the cleaned parquet file.
    cmd: python src/data_preparation.py
    deps:
      - src/data_preparation.py
      - data/olist_customers_dataset.csv
      - data/olist_orders_dataset.csv
      - data/olist_order_items_dataset.csv
      - data/olist_products_dataset.csv
      - data/olist_order_reviews_dataset.csv
      - data/olist_order_payments_dataset.csv
      - data/product_category_name_translation.csv
    outs:
      - data/processed/interactions.parquet
      - data/processed/README.md

  featurize:
    desc: >
      Stage 2: Feature Engineering.
      Generates 42 features from the cleaned interactions:
      numerical, temporal, categorical encodings, 
      and user/product aggregations.
    cmd: python src/feature_engineering.py
    deps:
      - src/feature_engineering.py
      - data/processed/interactions.parquet
    outs:
      - data/processed/interactions_fe.parquet
      - data/processed/FEATURES.md
      - data/processed/feature_metadata.json
      - data/processed/id_mappings.json

  validate:
    desc: >
      Stage 3: Validation.
      Sanity checks on the feature-engineered dataset:
      shape, columns, and absence of critical nulls.
    cmd: >
      python -c "import pandas as pd; df = pd.read_parquet('data/processed/interactions_fe.parquet'); assert df.shape == (99785, 42), f'Wrong shape: {df.shape}'; assert df['review_score'].isna().sum() < 1000, 'Too many null reviews'; print('Validation OK', df.shape)"
    deps:
      - data/processed/interactions_fe.parquet
